name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.API_GATEWAY_URL }}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID }}
          NEXT_PUBLIC_AWS_REGION: ${{ env.AWS_REGION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync frontend/out/ s3://${{ vars.FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DIST_ID }} --paths "/*"

  deploy-backend:
    runs-on: ubuntu-latest
    environment: production
    env:
      PREFIX: aiapply-dev
      BUILD_DIR: /tmp/lambda_build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package and deploy Lambda functions
        run: |
          set -e
          mkdir -p "$BUILD_DIR"

          # Helper: install binary wheels for Lambda's Linux x86_64 runtime
          pip_lambda() {
            local target="$1"; shift
            pip install \
              --platform manylinux2014_x86_64 \
              --target "$target" \
              --python-version 3.12 \
              --only-binary=:all: \
              --quiet "$@"
          }

          # Helper: strip runtime-unnecessary files to stay under Lambda's 250 MB unzipped limit.
          # numpy+pandas alone unzip to ~200 MB; removing tests/stubs/f2py cuts ~80 MB.
          strip_pkg() {
            local target="$1"
            # Bytecode caches — Python regenerates them at runtime
            find "$target" -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
            find "$target" -name "*.pyc" -delete 2>/dev/null || true
            find "$target" -name "*.pyo" -delete 2>/dev/null || true
            # Type stubs — only used by type checkers, not at runtime
            find "$target" -name "*.pyi" -delete 2>/dev/null || true
            # Test suites — not needed at runtime
            find "$target" -type d -name "tests"   -exec rm -rf {} + 2>/dev/null || true
            find "$target" -type d -name "test"    -exec rm -rf {} + 2>/dev/null || true
            find "$target" -type d -name "testing" -exec rm -rf {} + 2>/dev/null || true
            # numpy extras — f2py (Fortran bridge) and distutils not used in Lambda
            find "$target" -type d -name "f2py"     -exec rm -rf {} + 2>/dev/null || true
            find "$target" -type d -name "distutils" -exec rm -rf {} + 2>/dev/null || true
            # pip metadata — not needed at runtime
            find "$target" -type d -name "*.dist-info" -exec rm -rf {} + 2>/dev/null || true
            find "$target" -type d -name "*.egg-info"  -exec rm -rf {} + 2>/dev/null || true
          }

          # Helper: upload via S3 when zip > 50 MB (Lambda direct limit)
          deploy_lambda() {
            local name="$1" zip="$2"
            local size_mb=$(( $(stat -c%s "$zip") / 1048576 ))
            if [ "$size_mb" -ge 50 ]; then
              echo "  Large package (${size_mb} MB) — uploading via S3"
              local s3_key="lambda-deploy/${name}.zip"
              aws s3 cp "$zip" "s3://${{ vars.FRONTEND_BUCKET }}/${s3_key}" --no-progress
              aws lambda update-function-code \
                --function-name "$name" \
                --s3-bucket "${{ vars.FRONTEND_BUCKET }}" \
                --s3-key "$s3_key" \
                --no-cli-pager
            else
              aws lambda update-function-code \
                --function-name "$name" \
                --zip-file "fileb://${zip}" \
                --no-cli-pager
            fi
          }

          # --- api (no extra deps — boto3 is built into Lambda runtime) ---
          echo "=== api ==="
          PKG="$BUILD_DIR/api" && mkdir -p "$PKG"
          cp backend/lambdas/api/handler.py "$PKG/"
          (cd "$PKG" && zip -r "$BUILD_DIR/api.zip" . -q)
          deploy_lambda "$PREFIX-api-handler" "$BUILD_DIR/api.zip"

          # --- cv_analyst ---
          echo "=== cv_analyst ==="
          PKG="$BUILD_DIR/cv_analyst" && mkdir -p "$PKG"
          cp backend/lambdas/cv_analyst/handler.py "$PKG/"
          pip_lambda "$PKG" anthropic==0.84.0 PyPDF2==3.0.1 python-docx==1.2.0
          (cd "$PKG" && zip -r "$BUILD_DIR/cv_analyst.zip" . -q)
          deploy_lambda "$PREFIX-cv-analyst" "$BUILD_DIR/cv_analyst.zip"

          # --- job_scout (python-jobspy pulls pandas+numpy — strip before zipping) ---
          echo "=== job_scout ==="
          PKG="$BUILD_DIR/job_scout" && mkdir -p "$PKG"
          cp backend/lambdas/job_scout/handler.py "$PKG/"
          pip_lambda "$PKG" anthropic==0.84.0 python-jobspy
          strip_pkg "$PKG"
          echo "  Stripped size: $(du -sh "$PKG" | cut -f1)"
          (cd "$PKG" && zip -r "$BUILD_DIR/job_scout.zip" . -q)
          deploy_lambda "$PREFIX-job-scout" "$BUILD_DIR/job_scout.zip"

          # --- cv_tailor ---
          echo "=== cv_tailor ==="
          PKG="$BUILD_DIR/cv_tailor" && mkdir -p "$PKG"
          cp backend/lambdas/cv_tailor/handler.py "$PKG/"
          pip_lambda "$PKG" anthropic==0.84.0
          (cd "$PKG" && zip -r "$BUILD_DIR/cv_tailor.zip" . -q)
          deploy_lambda "$PREFIX-cv-tailor" "$BUILD_DIR/cv_tailor.zip"

          echo "=== All Lambdas deployed ==="
