name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.API_GATEWAY_URL }}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID }}
          NEXT_PUBLIC_AWS_REGION: ${{ env.AWS_REGION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync frontend/out/ s3://${{ vars.FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DIST_ID }} --paths "/*"

  deploy-backend:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package and deploy Lambda functions
        run: |
          for func_dir in backend/lambdas/*/; do
            func_name=$(basename "$func_dir")
            # Map directory name → Terraform function name:
            #   underscores → hyphens, api → api-handler
            lambda_name="${func_name//_/-}"
            [ "$lambda_name" = "api" ] && lambda_name="api-handler"
            echo "Deploying $func_name → aiapply-dev-${lambda_name}..."
            cd "$func_dir"
            mkdir -p package
            pip install -r "$GITHUB_WORKSPACE/backend/requirements.txt" -t package/ --quiet
            cp *.py package/
            cd package
            zip -r "../${func_name}.zip" . -q
            cd ..
            aws lambda update-function-code \
              --function-name "aiapply-dev-${lambda_name}" \
              --zip-file "fileb://${func_name}.zip" \
              --no-cli-pager || echo "Function aiapply-dev-${lambda_name} not found, skipping"
            cd $GITHUB_WORKSPACE
          done
